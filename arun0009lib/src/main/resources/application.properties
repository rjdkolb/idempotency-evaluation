greatspring.application.name=arun0009lib
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.mvc.problemdetails.enabled=true

idempotent.key.header=Idempotency-Key
idempotent.rds.table-name=idempotent
idempotent.rds.cleanup.fixed-delay=60000
idempotent.rds.cleanup.batch-size=1000

# Wait budget for in-flight duplicates (default 5 retries = 3.1s total,
# too short for our 5s test). 8 retries ≈ 25s budget.
idempotent.inprogress.max.retries=8

