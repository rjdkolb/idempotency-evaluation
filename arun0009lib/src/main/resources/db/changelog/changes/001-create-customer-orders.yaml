databaseChangeLog:
  - changeSet:
      id: 001-create-customer-orders
      author: copilot
      changes:
        - createTable:
            tableName: customer_order
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_customer_order
              - column:
                  name: tenant
                  type: VARCHAR(255)
                  defaultValue: legacy
                  constraints:
                    nullable: false
              - column:
                  name: customer_order_reference
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: supplier_order_reference
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
        - createIndex:
            tableName: customer_order
            indexName: ux_customer_order_tenant_reference
            unique: true
            columns:
              - column:
                  name: tenant
              - column:
                  name: customer_order_reference
